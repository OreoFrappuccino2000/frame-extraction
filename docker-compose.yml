version: '3.8'

services:
  frame-extraction-service:
    build: .
    ports:
      - "10000:10000"
    environment:
      - HOST=0.0.0.0
      - PORT=10000
      - FFMPEG_BIN=ffmpeg
      - FFPROBE_BIN=ffprobe
    volumes:
      - ./uploads:/tmp/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 可选：添加Nginx反向代理
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frame-extraction-service
    restart: unless-stopped